# Publish GitHub Release assets: sdist, wheel, SHA256SUMS (trigger: annotated tag v*).
# Requires: tag version must match [project].version in pyproject.toml (e.g. v0.1.0 ↔ 0.1.0).
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify tag matches pyproject.toml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:?}"
          VER="${TAG#v}"
          PYVER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$VER" != "$PYVER" ]; then
            echo "::error::Git tag '$TAG' implies version '$VER' but pyproject.toml has '$PYVER'"
            exit 1
          fi

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build --outdir dist

      - name: SHA256 checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.whl ./*.tar.gz > SHA256SUMS
          sha256sum -c SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
