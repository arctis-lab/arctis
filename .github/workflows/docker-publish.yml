# Build and push multi-arch image to GHCR.
# Image: ghcr.io/<lowercase github.repository> — e.g. ghcr.io/arctis-lab/arctis.
# Triggers: tag push v*, or manual "Run workflow" (uses [project].version from pyproject.toml).
name: Docker publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: docker-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase for OCI)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - name: Verify tag matches pyproject (tag push only) and compute tags/labels
        id: oci
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PYVER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"
            VER="${TAG#v}"
            if [ "$VER" != "$PYVER" ]; then
              echo "::error::Git tag '$TAG' implies version '$VER' but pyproject.toml has '$PYVER'"
              exit 1
            fi
          fi
          IMG="${{ env.REGISTRY }}/${IMAGE_NAME}"
          TAGS="${IMG}:${PYVER}"
          if [ "$EVENT_NAME" = "push" ] && [[ "$REF_NAME" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"${IMG}:latest"
          fi
          echo "tags<<DELIM" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "DELIM" >> "$GITHUB_OUTPUT"
          echo "labels<<DELIM" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.title=arctis" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.description=Arctis API, engine runtime, and Ghost CLI" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.version=${PYVER}" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "org.opencontainers.image.revision=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "DELIM" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.oci.outputs.tags }}
          labels: ${{ steps.oci.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.push.outputs.digest }}"
