# Secret scanning without gitleaks/gitleaks-action (avoids org-license gate on GitHub).
# Uses upstream gitleaks CLI + repo .gitleaks.toml / .gitleaksignore.
name: Gitleaks

on:
  push:
  pull_request:

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.0"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Detect secrets
        run: |
          set -euo pipefail
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner
